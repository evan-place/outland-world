name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate:assets
      - name: Build for GitHub Pages
        env:
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
        run: |
          if [ "$CUSTOM_DOMAIN" = "true" ]; then
            echo "Building for enteroutland.com (root paths + CNAME)"
            cp docs/enteroutland.com.CNAME public/CNAME
            npm run build
            rm -f public/CNAME
          else
            echo "Building for github.io/outland-world/ (project subpath)"
            rm -f public/CNAME
            SITE_SUBPATH=/outland-world/ npm run build
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
