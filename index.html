<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Outland — imagine what's possible." />
    <title>Outland</title>
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/fonts.css" />
    <link rel="stylesheet" href="/src/styles/chrome.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <div id="webgl-root" aria-hidden="true"></div>

      <div id="story-layer">
        <canvas id="story-canvas" aria-hidden="true"></canvas>
        <div id="story-a11y" class="visually-hidden" aria-live="polite"></div>
      </div>

      <header class="chrome-logo">
        <img src="/assets/logo.png" alt="Outland" width="205" height="45" />
      </header>

      <aside class="chrome-rail" aria-label="Section navigation">
        <div class="rail-inner">
          <p class="rail-dept">
            Department of <em>imagination</em>
          </p>
          <div class="rail-meta">
            <div class="rail-meta-col rail-meta-col--border">
              <span class="rail-label">Introduction</span>
            </div>
            <div class="rail-meta-col">
              <span class="rail-label">01</span>
              <span class="rail-label rail-label--tall">EnterOutland 2026</span>
            </div>
          </div>
        </div>
      </aside>

      <footer class="chrome-cta">
        <button type="button" class="cta-pill">Lets Build</button>
        <img class="cta-wave" src="/assets/waveform-icon.png" alt="" width="51" height="43" />
      </footer>

      <div id="scroll-track" aria-hidden="true"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
