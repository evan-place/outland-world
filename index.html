<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Outland — imagine what's possible." />
    <link rel="canonical" href="https://enteroutland.com/" />
    <meta property="og:title" content="Outland" />
    <meta property="og:description" content="Outland — imagine what's possible." />
    <meta property="og:url" content="https://enteroutland.com/" />
    <meta property="og:type" content="website" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Outland</title>
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/fonts.css" />
    <link rel="stylesheet" href="/src/styles/chrome.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="stylesheet" href="/src/styles/story-text.css" />
    <link rel="stylesheet" href="/src/styles/contact-modal.css" />
  </head>
  <body tabindex="-1">
    <div id="app">
      <div id="webgl-root" aria-hidden="true"></div>

      <div id="story-layer">
        <div class="story-stage">
          <div class="story-text-stack">
            <p id="story-text-a" class="story-text" aria-live="polite"></p>
            <p id="story-text-b" class="story-text" aria-hidden="true"></p>
            <canvas id="story-canvas" aria-hidden="true"></canvas>
          </div>
        </div>
        <div class="story-playback" id="story-playback">
          <div id="story-progress" class="story-progress" hidden aria-hidden="true">
            <div class="story-progress__track">
              <div class="story-progress__fill"></div>
            </div>
          </div>
          <button
            type="button"
            id="story-restart"
            class="story-restart"
            hidden
            aria-hidden="true"
            aria-label="Start story over"
          >
            <svg class="story-restart__icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 5V2L7 7l5 5V9c2.76 0 5 2.24 5 5a5 5 0 1 1-9.9-1"
                fill="none"
                stroke="currentColor"
                stroke-width="1.25"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
        <div id="story-a11y" class="visually-hidden" aria-live="polite"></div>
      </div>

      <header class="chrome-logo">
        <img src="/brand/outland-logo.svg" alt="Outland" width="205" height="45" />
      </header>

      <aside class="chrome-rail" aria-label="Section navigation">
        <div class="rail-inner">
          <div class="rail-primary">
            <nav class="rail-social" aria-label="Social links">
              <a
                class="rail-social__link"
                href="https://x.com/EnterOutland"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Outland on X"
              >
                <img src="/assets/social/x.svg" alt="" width="18" height="17" />
              </a>
              <a
                class="rail-social__link"
                href="https://www.linkedin.com/company/enteroutland/?viewAsMember=true"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Outland on LinkedIn"
              >
                <img src="/assets/social/linkedin.svg" alt="" width="18" height="18" />
              </a>
              <a
                class="rail-social__link"
                href="https://www.instagram.com/enteroutland"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Outland on Instagram"
              >
                <img src="/assets/social/instagram.svg" alt="" width="20" height="20" />
              </a>
            </nav>
            <p class="rail-dept">
              Department of <em>imagination</em>
            </p>
          </div>
          <div class="rail-meta">
            <div class="rail-meta-col rail-meta-col--border">
              <span class="rail-label">Introduction</span>
            </div>
            <div class="rail-meta-col rail-meta-col--numbers">
              <span class="rail-label">01</span>
              <span class="rail-label">EnterOutland 2026</span>
            </div>
          </div>
        </div>
      </aside>

      <footer class="chrome-cta">
        <button type="button" id="contact-open" class="cta-pill">Let's Build</button>
        <button
          type="button"
          id="audio-toggle"
          class="chrome-audio"
          aria-pressed="true"
          aria-label="Unmute audio"
        ></button>
      </footer>

      <div id="contact-modal" class="contact-modal" hidden aria-hidden="true">
        <button type="button" class="contact-modal__backdrop" data-contact-close aria-label="Close"></button>
        <div
          class="contact-modal__dialog"
          role="dialog"
          aria-modal="true"
          aria-labelledby="contact-headline"
        >
          <button type="button" class="contact-modal__close" data-contact-close aria-label="Close">
            &times;
          </button>

          <div class="contact-modal__panel">
            <h2 id="contact-headline" class="contact-modal__headline">
              Tomorrow starts with <em>imagination</em>.
            </h2>
            <p class="contact-modal__lede">Tell us about yours.</p>

            <form id="contact-form" class="contact-modal__form" novalidate>
              <input type="hidden" name="_subject" value="New inquiry from Outland" />
              <input type="hidden" name="_template" value="table" />
              <input type="text" name="_honey" tabindex="-1" autocomplete="off" hidden aria-hidden="true" />

              <div class="contact-modal__scroll">
                <div class="contact-modal__field">
                  <label class="contact-modal__label" for="contact-name">Name</label>
                  <input
                    class="contact-modal__input"
                    type="text"
                    id="contact-name"
                    name="name"
                    autocomplete="name"
                    required
                  />
                </div>

                <div class="contact-modal__field">
                  <label class="contact-modal__label" for="contact-email">Email</label>
                  <input
                    class="contact-modal__input"
                    type="email"
                    id="contact-email"
                    name="email"
                    autocomplete="email"
                    required
                  />
                </div>

                <div class="contact-modal__field">
                  <label class="contact-modal__label" for="contact-company">Company</label>
                  <input
                    class="contact-modal__input"
                    type="text"
                    id="contact-company"
                    name="company"
                    autocomplete="organization"
                  />
                </div>

                <div class="contact-modal__field">
                  <label class="contact-modal__label" for="contact-message">What are you imagining?</label>
                  <textarea
                    class="contact-modal__textarea"
                    id="contact-message"
                    name="message"
                    rows="4"
                    required
                  ></textarea>
                </div>
              </div>

              <p class="contact-modal__error" hidden></p>

              <div class="contact-modal__actions">
                <button type="submit" class="contact-modal__submit" disabled>Send</button>
              </div>
            </form>

            <p class="contact-modal__success" hidden tabindex="-1">
              Thank you. We'll be in touch.
            </p>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
