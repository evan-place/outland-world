<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Outland — imagine what's possible." />
    <title>Outland</title>
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/fonts.css" />
    <link rel="stylesheet" href="/src/styles/chrome.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="stylesheet" href="/src/styles/story-text.css" />
  </head>
  <body tabindex="-1">
    <div id="app">
      <div id="webgl-root" aria-hidden="true"></div>

      <div id="story-layer">
        <div class="story-stage">
          <div class="story-text-stack">
            <p id="story-text-a" class="story-text" aria-live="polite"></p>
            <p id="story-text-b" class="story-text" aria-hidden="true"></p>
            <canvas id="story-canvas" aria-hidden="true"></canvas>
          </div>
          <div id="story-progress" class="story-progress" hidden aria-hidden="true">
            <div class="story-progress__track">
              <div class="story-progress__fill"></div>
            </div>
          </div>
        </div>
        <div id="story-a11y" class="visually-hidden" aria-live="polite"></div>
      </div>

      <header class="chrome-logo">
        <img src="/brand/outland-logo.svg" alt="Outland" width="205" height="45" />
      </header>

      <aside class="chrome-rail" aria-label="Section navigation">
        <div class="rail-inner">
          <p class="rail-dept">
            Department of <em>imagination</em>
          </p>
          <div class="rail-meta">
            <div class="rail-meta-col rail-meta-col--border">
              <span class="rail-label">Introduction</span>
            </div>
            <div class="rail-meta-col rail-meta-col--numbers">
              <span class="rail-label">01</span>
              <span class="rail-label">EnterOutland 2026</span>
            </div>
          </div>
        </div>
      </aside>

      <footer class="chrome-cta">
        <button type="button" class="cta-pill">Lets Build</button>
        <button
          type="button"
          id="audio-toggle"
          class="chrome-audio"
          aria-pressed="false"
          aria-label="Mute audio"
        >
          <img
            id="audio-toggle-icon"
            src="/assets/audio-on.svg"
            alt=""
            width="40"
            height="40"
          />
        </button>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
